name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build + typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # SHA-pinned (audit #13) — `@v4` major-tag could be force-pushed.
      # checkout v4.2.2; setup-node v4.1.0
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  test:
    name: vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    # Test job is now must-pass. The 7 known-failing skill-registry tests
    # are explicitly marked .skip in the source file pending L-5 isolation
    # cleanup, so any new failure surfaces here instead of being masked by
    # continue-on-error.
    steps:
      # SHA-pinned (audit #13) — `@v4` major-tag could be force-pushed.
      # checkout v4.2.2; setup-node v4.1.0
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
